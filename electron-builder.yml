appId: com.workpulse.agent
productName: WorkPulse Agent
npmRebuild: false
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: workpulse-agent-electron
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  # certificateFile: "path/to/your/certificate.pfx"
  # certificatePassword: "YOUR_PASSWORD"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  perMachine: false
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
mac:
  entitlementsInherit: build/entitlements.mac.plist
  # identity: "Apple Development: Your Name (ID)"  # TODO: Add your Apple Developer ID
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    - NSScreenCaptureUsageDescription: Application requests access to the device's screen for activity tracking.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
publish:
  provider: generic
  url: https://api.projectsoftware.com/api/v1/system/agent-release/
